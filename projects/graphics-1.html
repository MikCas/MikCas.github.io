          <h1>Particle System</h1>
          <p class="tag">Graphics</p>
        </section>
        <section class="about">
          <p class="bio">
            A GPU-driven particle system built in <a href="https://derivative.ca/" target="_blank" rel="noopener">TouchDesigner</a>
            with custom <a href="https://www.khronos.org/opengl/wiki/OpenGL_Shading_Language" target="_blank" rel="noopener">GLSL</a>
            shaders. Thousands of points follow simple Newtonian rules on the GPU, with a bloom post-process on top.
          </p>
