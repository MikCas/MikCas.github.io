<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Audio Analysis — Mikhail Cassar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body data-route="project">
    <main>
      <div class="proj-side">
        <section class="intro">
          <p><a class="back" href="/">← back</a></p>
          <h1>Audio Analysis</h1>
          <p class="tag">Audiovisual</p>
        </section>
        <section class="about">
          <p class="bio">Live audiovisual performance built from my custom components, connected to a <a href="https://www.korg.com/us/products/dj/nts_1/" target="_blank" rel="noopener">Korg Volca NTS-1</a> synthesizer. The project uses <a href="https://derivative.ca/" target="_blank" rel="noopener">TouchDesigner</a> for real-time audio analysis and visuals, and currently includes Oscilloscope and Spectrogram components.</p>
        </section>

        <ul class="links">
          <li><a href="https://github.com/MikCas/audio-analysis-td" target="_blank" rel="noopener">GitHub</a></li>
        </ul>
      </div>
      <div class="proj-media">
        <div class="media media--16x9">
          <video
            src="/media/audio-analysis/oscilloscope.mp4"
            controls
            autoplay
            loop
            muted
            playsinline
            preload="metadata"
          ></video>
        </div>
        <div class="media media--16x9">
          <video
            src="/media/audio-analysis/spectrogram.mp4"
            controls
            autoplay
            loop
            muted
            playsinline
            preload="metadata"
          ></video>
        </div>
        <div class="media media--16x9 media--full">
          <iframe
            src="https://player.vimeo.com/video/1188017805?autoplay=1&loop=1&muted=1"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen
            title="Audio Analysis"
          ></iframe>
        </div>
        <img src="/media/audio-analysis/oscilloscope_network.png" alt="Oscilloscope network">
        <img src="/media/audio-analysis/spectrogram_network.png" alt="Spectrogram network">
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
